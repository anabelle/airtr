# Nostr Relay — nostr.acars.pub
# Include this server block in the main nginx config.
#
# Prerequisites:
#   - SSL cert at /etc/letsencrypt/live/nostr.acars.pub/
#   - strfry-relay container on the same Docker network
#   - WebSocket upgrade map defined in main config:
#       map $http_upgrade $connection_upgrade {
#           default upgrade;
#           ''      close;
#       }

server {
    listen 443 ssl;
    http2 on;
    server_name nostr.acars.pub;

    ssl_certificate /etc/letsencrypt/live/nostr.acars.pub/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nostr.acars.pub/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Relay stats endpoint (updated every minute by cron)
    location = /stats {
        alias /var/www/relay/stats.json;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    location / {
        set $relay_upstream http://strfry-relay:7777;
        proxy_pass $relay_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived — 24h timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
