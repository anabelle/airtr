db = "./strfry-db/"

dbParams {
    # 4 GB max database size (48 GB free on VPS)
    # strfry uses LMDB which memory-maps the file but only allocates
    # actual disk space as data is written — this is a ceiling, not a reservation.
    mapSize = 4294967296
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 1000

    # 64 KB max message size
    maxWebsocketPayloadSize = 65536

    maxSubsPerConnection = 20

    info {
        name = "ACARS Relay"
        description = "Dedicated Nostr relay for ACARS aviation simulation"
        contact = "nostr.acars.pub"
    }

    maxFilterLimit = 500

    writePolicy {
        plugin = "/etc/strfry-policy/write-policy.sh"
    }

    compression {
        enabled = false
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
    }
}

events {
    maxEventSize = 65536
    rejectEventsOlderThanSeconds = 31536000
    rejectEventsNewerThanSeconds = 900
    rejectEphemeralEvents = false
    maxNumTags = 2000
    maxFilterLimit = 500
}
